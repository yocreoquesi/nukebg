server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version from the Server: header.
    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # COOP-only (COEP intentionally NOT set — see #41 closure).
    # App code does not use SharedArrayBuffer, and onnxruntime-web /
    # transformers.js fall back to single-threaded WASM cleanly when
    # crossOriginIsolated is false. Adding COEP would block the HF
    # model fetches + jsdelivr CDN (they don't advertise CORP), so the
    # performance gain isn't worth the fetch-path breakage. To enable
    # multi-threaded WASM later, set
    #   Cross-Origin-Embedder-Policy: credentialless
    # here and verify all connect-src hosts accept credentialless.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header X-DNS-Prefetch-Control "off" always;

    # CSP:
    # - 'unsafe-eval' + 'wasm-unsafe-eval' required by onnxruntime-web's
    #   new Function() WASM bootstrap.
    # - sha256 hashes cover the 3 inline JSON-LD blocks in index.html.
    #   Regenerate with `node scripts/compute-csp-hashes.mjs` after edits.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval' 'unsafe-eval' 'sha256-ztsBsS9xwNCs2KJmi68kVCSM3B4HL6tyE1O6CXx4z5k=' 'sha256-SzSpABgAR0NQroLM6JrGu4Sw+a01dpq3UNlybakcesw=' 'sha256-n+hPDoKBtir6IJzQxsYO0Jml5FRgLaNreG+d2UAvfFw=' https://cdn.jsdelivr.net; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://huggingface.co https://cdn-lfs.huggingface.co https://cdn-lfs-us-1.huggingface.co https://cdn.jsdelivr.net https://cas-bridge.xethub.hf.co; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'" always;

    # Cache static assets
    # Note: add_header in location blocks replaces parent headers in nginx,
    # so we must repeat ALL security headers in each location block.
    location ~* \.(js|css|png|svg|woff2|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header X-DNS-Prefetch-Control "off" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval' 'unsafe-eval' 'sha256-ztsBsS9xwNCs2KJmi68kVCSM3B4HL6tyE1O6CXx4z5k=' 'sha256-SzSpABgAR0NQroLM6JrGu4Sw+a01dpq3UNlybakcesw=' 'sha256-n+hPDoKBtir6IJzQxsYO0Jml5FRgLaNreG+d2UAvfFw=' https://cdn.jsdelivr.net; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://huggingface.co https://cdn-lfs.huggingface.co https://cdn-lfs-us-1.huggingface.co https://cdn.jsdelivr.net https://cas-bridge.xethub.hf.co; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'" always;
    }

    # ONNX model files — cache aggressively, same-origin so CORP is fine
    location ~* \.onnx$ {
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header X-DNS-Prefetch-Control "off" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval' 'unsafe-eval' 'sha256-ztsBsS9xwNCs2KJmi68kVCSM3B4HL6tyE1O6CXx4z5k=' 'sha256-SzSpABgAR0NQroLM6JrGu4Sw+a01dpq3UNlybakcesw=' 'sha256-n+hPDoKBtir6IJzQxsYO0Jml5FRgLaNreG+d2UAvfFw=' https://cdn.jsdelivr.net; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://huggingface.co https://cdn-lfs.huggingface.co https://cdn-lfs-us-1.huggingface.co https://cdn.jsdelivr.net https://cas-bridge.xethub.hf.co; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/html application/javascript text/css application/json application/wasm;
    gzip_min_length 256;
}
