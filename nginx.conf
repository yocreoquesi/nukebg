server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # COOP/COEP: credentialless enables SharedArrayBuffer for multi-threaded WASM
    # Model is self-hosted (same-origin) so no cross-origin issues
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # CSP: 'unsafe-eval' required because onnxruntime-web uses new Function() for WASM bootstrap
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval' 'unsafe-eval' 'unsafe-inline'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://github.com https://*.githubusercontent.com; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'" always;

    # Cache static assets
    # Note: add_header in location blocks replaces parent headers in nginx,
    # so we must repeat ALL security headers in each location block.
    location ~* \.(js|css|png|svg|woff2|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval' 'unsafe-eval' 'unsafe-inline'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://github.com https://*.githubusercontent.com; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'" always;
    }

    # ONNX model files — cache aggressively, same-origin so CORP is fine
    location ~* \.onnx$ {
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval' 'unsafe-eval' 'unsafe-inline'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://github.com https://*.githubusercontent.com; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/html application/javascript text/css application/json application/wasm;
    gzip_min_length 256;
}
